<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Preston Vander Vos</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="manifest" href="assets/icons/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .blog-card {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .blog-card:hover {
            transform: translateY(-2px);
        }
        .blog-card:hover .blog-title {
            color: #10b981 !important;
        }
        .dark .blog-card:hover .blog-title {
            color: #6ee7b7 !important;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'base-100': '#1f2937',
                        'base-200': '#374151',
                        'accent': '#6ee7b7',
                        'accent-light': '#10b981',
                    },
                }
            }
        }
    </script>
    <script>
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.remove('dark')
          document.documentElement.classList.add('light')
        } else {
          document.documentElement.classList.add('dark')
        }
    </script>
    <meta property="og:title" content="Blog | Preston Vander Vos">
    <meta property="og:description" content="My musings">
    <meta property="og:url" content="https://pvandervos.com/blog">
    <meta property="og:type" content="website">
</head>
<body class="bg-white dark:bg-base-100 text-gray-800 dark:text-gray-300 transition-colors duration-300" data-page="blog">
    <script src="../layout.js"></script>
    <script>
        const mainContent = `
            <section class="mb-16">
                <h1 class="text-4xl font-bold border-b-2 border-accent-light dark:border-accent pb-2 mb-6 text-gray-900 dark:text-white">Blog</h1>

                <div class="space-y-8">
                    <article class="blog-card border-b border-gray-200 dark:border-gray-700 pb-8" onclick="window.location.href='https://www.circle.com/blog/amp-rethinking-block-building-with-multi-proposer-consensus'">
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold mb-2">
                                <a href="https://www.circle.com/blog/amp-rethinking-block-building-with-multi-proposer-consensus" class="blog-title text-gray-900 dark:text-white transition-colors duration-300">
                                    AMP: Rethinking Block Building with Multi-Proposer Consensus
                                </a>
                            </h2>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">May 28, 2026</p>
                        </div>
                        <p class="text-gray-700 dark:text-gray-300 leading-relaxed">
                            Most blockchains hand block construction to a single block assembler with unilateral power over what is included and how it is ordered. ...
                        </p>
                    </article>
                </div>
                <div class="space-y-8">
                    <article class="blog-card border-b border-gray-200 dark:border-gray-700 pb-8" onclick="window.location.href='blog/odontoceti.html'">
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold mb-2">
                                <a href="blog/odontoceti.html" class="blog-title text-gray-900 dark:text-white transition-colors duration-300">
                                    Odontoceti
                                </a>
                            </h2>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">Oct 7, 2025</p>
                        </div>
                        <p class="text-gray-700 dark:text-gray-300 leading-relaxed">
                            At the heart of every blockchain is a consensus protocol. It’s how the network knows which block is next in the chain. ...
                        </p>
                    </article>
                </div>
            </section>
        `;

        document.addEventListener('DOMContentLoaded', () => {
            loadLayout(mainContent);
        });
    </script>
</body>
</html>
